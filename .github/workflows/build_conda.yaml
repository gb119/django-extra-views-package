
name: Conda

on:
  push

# workflow_dispatch:        # Un comment line if you also want to trigger action manually

jobs:
  conda_deployment_with_new_tag:
    name: Conda deployment of package for platform ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Conda environment creation and activation
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          environment-file: env.yaml
          activate-environment: build
          auto-update-conda: true
          auto-activate-base: false
          show-channel-urls: true
      - name: Build conda package
        shell: bash -l {0}
        run: |
          out_dir=$(mktemp -d -t compilation-XXXXXXXXXX)
          conda activate build
          conda build . \
            --no-anaconda-upload \
            --output-folder "$out_dir" \
            --python 3.12
      - name: Upload conda package
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA }}
        run: |
          conda activate build
          for dirname in "$out_dir"/*; do
            if [ -d "$dirname" ]; then
              for filename in "$dirname"/*; do
                if [[ "$filename" == *.tar.bz2 ]]; then
                  conda run -n build anaconda upload \
                    --user phygbu \
                    --force \
                    --label main \
                    "$filename"
                fi
              done
            fi
          done
